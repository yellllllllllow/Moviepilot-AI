version: '3.8'

services:
  moviepilot-ai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moviepilot-ai
    ports:
      - "3000:3000"   # 前端 Nginx
    volumes:
      - ./config:/config
      - ./data:/data
    environment:
      - TZ=Asia/Shanghai
      - SUPERUSER=admin
      - SUPERUSER_PASSWORD=admin123
      - API_TOKEN=moviepilot
      - NGINX_PORT=3000
      - PORT=3001
      - PROXY_HOST=
      - GITHUB_TOKEN=
      - CN_UPDATE=true
      - AUTO_UPDATE=false
    restart: unless-stopped
